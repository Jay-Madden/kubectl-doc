apiVersion: nvidia.com/v1beta1
kind: DynamoGraphDeployment
spec: # required=true description="Spec defines the desired graph topology and pod-level defaults for each component."
  components: # required=true description="Components are the named graph nodes reconciled into Kubernetes workloads." x-kubernetes-list-type=map x-kubernetes-list-map-keys=name
    - name: string | required=true minLength=1 maxLength=63 description="Unique component name used for generated workload and service names."
      podTemplate: object | description="Pod template fragment merged with operator defaults before creating pods."
      replicas: integer | default=1 minimum=0 format=int32 description="Desired number of pod replicas for the component."
      resources: # description="Container resource requests and limits for the component."
        limits: "map[string]string | description=\"Resource limits keyed by Kubernetes resource name.\""
        requests: "map[string]string | description=\"Resource requests keyed by Kubernetes resource name.\""
      services: # description="Service ports exposed by this component."
        - name: string | required=true minLength=1 description="Service port name."
          port: integer | required=true minimum=1 maximum=65535 format=int32 description="Service port number."
          protocol: string | default="TCP" enum="TCP,UDP" description="Network protocol for the service port."
      sharedMemorySize: string | description="Shared memory size mounted into the component pod." # x-kubernetes-int-or-string
  annotations: "map[string]string | description=\"Annotations propagated to generated workloads unless a component overrides them.\""
  backendFramework: string | default="sglang" enum="sglang,vllm,trtllm" description="Backend framework used when a component does not override the runtime explicitly."
  envs: # description="Environment variables applied to every component unless a component overrides them."
    - name: string | required=true minLength=1 description="Name of the environment variable."
      value: string | description="Literal value for the environment variable."
      valueFrom: # description="Source for the environment variable value."
        secretKeyRef: # description="Selects a key from a Secret in the same namespace."
          key: string | required=true minLength=1 description="Key within the Secret."
          name: string | required=true minLength=1 description="Name of the Secret."
          optional: boolean | description="Whether the Secret or key may be absent."
status: # description="Status summarizes the observed deployment state."
  conditions: # description="Conditions report the latest reconciliation state for the deployment."
    - status: string | required=true enum="True,False,Unknown" description="Condition status."
      type: string | required=true description="Condition type."
      message: string | description="Human-readable details for the condition state."
      reason: string | description="Short machine-readable reason for the condition state."
  observedGeneration: integer | format=int64 description="Most recent metadata generation observed by the controller."

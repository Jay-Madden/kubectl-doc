# DynamoGraphDeployment is the Schema for the dynamographdeployments API.
#
# v1beta1 is a served version: the API server accepts reads and writes against it, and transparently converts to/from v1alpha1 (still the storage version until a later MR flips it). Conversion goes through the operator's conversion webhook; see api/v1alpha1/*_conversion.go.
apiVersion: nvidia.com/v1beta1
kind: DynamoGraphDeployment
spec: # description="spec defines the desired state for this graph deployment."
  annotations: "map[string]string | description=\"annotations to propagate to all child resources (PCS, DCD, Deployments, and pod templates). Component-level (`podTemplate`) values take precedence on conflict.\""
  backendFramework: string | enum="sglang,vllm,trtllm" description="backendFramework specifies the backend framework (e.g. \"sglang\", \"vllm\", \"trtllm\")."
  components: # maxItems=25 description="components are the components deployed as part of this graph. Each entry carries its own stable logical `name`, and names must be unique within the list. Component types are generally repeatable, except `type: epp` which may appear at most once." x-kubernetes-list-type=map x-kubernetes-list-map-keys=name x-kubernetes-validations
    - name: string | required=true minLength=1 maxLength=63 pattern="^[A-Za-z0-9]([-A-Za-z0-9]*[A-Za-z0-9])?$" description="name is the stable logical identifier for this component within its DynamoGraphDeployment. It must be unique within the parent's `spec.components` list. For standalone DynamoComponentDeployment objects, the defaulting webhook populates `name` from `metadata.name` on admission, so users typically do not need to set it explicitly. `name` is decoupled from the underlying Kubernetes resource name so that the operator can rename child workloads (e.g. suffixing worker DCDs with a hash during rolling updates) without losing the stable identity that downstream consumers (labels, status maps, DGDSA references, planner RBAC, EPP filters) depend on."
      compilationCache: # description="compilationCache configures a PVC-backed compilation cache. The operator handles backend-specific mount paths and environment variables, so users do not need to hand-wire them into `podTemplate`. Extracted from v1alpha1's `volumeMount.useAsCompilationCache` flag."
        pvcName: string | required=true minLength=1 description="pvcName references a user-created PVC by name. The PVC must exist in the same namespace as the DynamoGraphDeployment."
        mountPath: string | description="mountPath overrides the backend-specific default mount path. When empty, the operator selects a default appropriate for the backend framework."
      eppConfig: # description="eppConfig holds EPP-specific configuration for Endpoint Picker Plugin components. Only meaningful when `type` is `epp`." x-kubernetes-validations
        config: # description="config allows specifying EPP `EndpointPickerConfig` directly as a structured object. The operator marshals this to YAML and creates a ConfigMap automatically. Mutually exclusive with `configMapRef`. One of `configMapRef` or `config` must be specified." x-kubernetes-preserve-unknown-fields
          plugins: # required=true description="Plugins is the list of plugins that will be instantiated."
            - type: string | required=true description="Type specifies the plugin type to be instantiated."
              name: string | description="Name provides a name for plugin entries to reference. If omitted, the value of the Plugin's Type field will be used."
              parameters: object | description="Parameters are the set of parameters to be passed to the plugin's factory function. The factory function is responsible to parse the parameters."
          schedulingProfiles: # required=true description="SchedulingProfiles is the list of named SchedulingProfiles that will be created."
            - name: string | required=true description="Name specifies the name of this SchedulingProfile"
              plugins: # required=true description="Plugins is the list of plugins for this SchedulingProfile. They are assigned to the appropriate \"slots\" based on their type."
                - pluginRef: string | required=true description="PluginRef specifies a partiular Plugin instance to be associated with this SchedulingProfile. The reference is to the name of an entry of the Plugins defined in the configuration's Plugins section"
                  weight: integer | description="Weight is the weight fo be used if this plugin is a Scorer."
          apiVersion: string | description="APIVersion defines the versioned schema of this representation of an object. Servers should convert recognized schemas to the latest internal value, and may reject unrecognized values. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources"
          featureGates: "[]string | description=\"FeatureGates is a set of flags that enable various experimental features with the EPP. If omitted non of these experimental features will be enabled.\""
          kind: string | description="Kind is a string value representing the REST resource this object represents. Servers may infer this from the endpoint the client submits requests to. Cannot be updated. In CamelCase. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds"
          saturationDetector: # description="SaturationDetector when present specifies the configuration of the Saturation detector. If not present, default values are used."
            kvCacheUtilThreshold: float | description="KVCacheUtilThreshold defines the KV cache utilization (0.0 to 1.0) above which a pod is considered to have insufficient capacity."
            metricsStalenessThreshold: string | description="MetricsStalenessThreshold defines how old a pod's metrics can be. If a pod's metrics are older than this, it might be excluded from \"good capacity\" considerations or treated as having no capacity for safety."
            queueDepthThreshold: integer | description="QueueDepthThreshold defines the backend waiting queue size above which a pod is considered to have insufficient capacity for new requests."
        configMapRef: # description="configMapRef references a user-provided ConfigMap containing EPP configuration. Mutually exclusive with `config`." x-kubernetes-map-type=atomic
          key: string | required=true description="The key to select."
          name: string | default="" description="Name of the referent. This field is effectively required, but due to backwards compatibility is allowed to be empty. Instances of this type with an empty value here are almost certainly wrong. More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names"
          optional: boolean | description="Specify whether the ConfigMap or its key must be defined"
      experimental: # description="experimental groups opt-in preview features whose API shape and behavior may change in breaking ways between v1beta1 releases, including disappearing without a name-preserving graduation path. In v1beta1 this block holds `gpuMemoryService` and `failover` (which remain tightly coupled -- failover requires GMS -- and are expected to evolve together as the DRA-based GPU sharing story matures), and `checkpoint` (whose interaction with the standalone DynamoCheckpoint resource and identity-hash computation is still settling). Fields here are explicitly NOT covered by the normal v1beta1 deprecation policy; do not depend on them for production workloads."
        checkpoint: # description="checkpoint configures container-image snapshotting and restore for this component. When set, the DGD controller can produce a DGD-scoped DynamoCheckpoint CR and later restore pods in the same DGD generation from that checkpoint for faster cold start. The user-facing shape of this field is still settling, which is why it lives under `experimental` in v1beta1 instead of at the top level." x-kubernetes-validations
          checkpointRef: string | description="checkpointRef references an existing DynamoCheckpoint CR by `metadata.name`. When set, this component's `identity` is ignored and the referenced checkpoint is used directly."
          identity: # description="Deprecated: identity is ignored by DGD-managed automatic checkpoints. Automatic checkpoints are scoped to the owning DGD/component generation and are never reused across DGDs."
            backendFramework: string | required=true enum="vllm,sglang,trtllm" description="backendFramework is the runtime framework (`vllm`, `sglang`, `trtllm`)."
            model: string | required=true minLength=1 description="model is the model identifier (e.g. \"meta-llama/Llama-3-70B\")."
            dtype: string | description="dtype is the data type (`fp16`, `bf16`, `fp8`, etc.). Deprecated for DGD-managed automatic checkpoints; it only participates in the legacy identity hash fallback for standalone objects."
            dynamoVersion: string | description="dynamoVersion is the Dynamo platform version. Deprecated for DGD-managed automatic checkpoints; it only participates in the legacy identity hash fallback for standalone objects."
            extraParameters: "map[string]string | description=\"extraParameters are additional parameters that affect the checkpoint hash. Deprecated for DGD-managed automatic checkpoints; it only participates in the legacy identity hash fallback for standalone objects.\""
            maxModelLen: integer | minimum=1 format=int32 description="maxModelLen is the maximum sequence length. Deprecated for DGD-managed automatic checkpoints; it only participates in the legacy identity hash fallback for standalone objects."
            pipelineParallelSize: integer | default=1 minimum=1 format=int32 description="pipelineParallelSize is the pipeline parallel configuration. Deprecated for DGD-managed automatic checkpoints; it only participates in the legacy identity hash fallback for standalone objects."
            tensorParallelSize: integer | default=1 minimum=1 format=int32 description="tensorParallelSize is the tensor parallel configuration. Deprecated for DGD-managed automatic checkpoints; it only participates in the legacy identity hash fallback for standalone objects."
          job: # description="job customizes the checkpoint Job that is created in Auto mode."
            gmsClientContainers: "[]string | description=\"gmsClientContainers lists checkpoint Job containers that should receive GMS client wiring. Requires gpuMemoryService on the component.\"" # x-kubernetes-list-type=set
            podTemplate: object | description="podTemplate customizes the checkpoint Job pod. The operator starts from the selected workload container and merges this template so users can add helper containers such as gms-saver."
          mode: string | default="Auto" enum="Auto,Manual" description="mode defines how checkpoint creation is handled. `Auto`: DGD controller creates the DynamoCheckpoint CR automatically. `Manual`: user must create the DynamoCheckpoint CR."
          targetContainerName: string | default="main" minLength=1 maxLength=63 pattern="^[a-z0-9]([-a-z0-9]*[a-z0-9])?$" description="targetContainerName is the workload container to snapshot and restore."
        failover: # description="failover configures active-passive GPU failover for this component. Requires `gpuMemoryService` to also be set, and `failover.mode` must match `gpuMemoryService.mode` (enforced by the validation webhook)."
          mode: string | default="IntraPod" enum="IntraPod,InterPod" description="mode selects the failover deployment topology. Must match `spec.experimental.gpuMemoryService.mode` (or `spec.components[*].experimental.gpuMemoryService.mode` inside a DynamoGraphDeployment)."
          numShadows: integer | default=1 minimum=1 maximum=1 format=int32 description="numShadows is the number of shadow (standby) engine containers per rank. Reserved for future use; the operator currently creates exactly one shadow."
        gpuMemoryService: # description="gpuMemoryService configures the GPU Memory Service (GMS). When set, GPU access for GMS clients is managed via DRA." x-kubernetes-validations
          deviceClassName: string | default="gpu.nvidia.com" description="deviceClassName is the DRA `DeviceClass` to request GPUs from."
          extraClientContainers: "[]string | description=\"extraClientContainers lists additional user-declared containers that should be wired as GMS clients in service pods. Checkpoint Job clients are declared under checkpoint.job.gmsClientContainers. In each rendered pod, only matching container names are wired; absent names are ignored.\"" # x-kubernetes-list-type=set
          extraClientPods: # description="extraClientPods declares additional GMS client pods for inter-pod GMS. This field is reserved for future use and is rejected until inter-pod client orchestration is wired." x-kubernetes-list-type=map x-kubernetes-list-map-keys=name
            - name: string | required=true minLength=1 maxLength=63 pattern="^[a-z0-9]([-a-z0-9]*[a-z0-9])?$" description="name identifies this client pod."
              podTemplate: object | required=true description="podTemplate configures the pod to run as a GMS client."
          mode: string | default="IntraPod" enum="IntraPod,InterPod" description="mode selects the GMS deployment topology."
      frontendSidecar: string | description="frontendSidecar optionally designates a container in `podTemplate.spec.containers` as the frontend sidecar. The value must match the `name` of a container in that list; the operator merges its frontend-sidecar defaults (auto-generated Dynamo env vars, ports, health probes) into that container the same way it merges into `\"main\"`. The full container definition (image, args, envFrom, env) lives in `podTemplate` -- this eliminates the redundant `image`, `args`, `envFromSecret`, and `envs` fields from v1alpha1's `FrontendSidecarSpec`. The validation webhook rejects values that do not match any container name in `podTemplate.spec.containers`."
      globalDynamoNamespace: boolean | description="globalDynamoNamespace places the component in the global Dynamo namespace rather than the per-deployment namespace derived from the DGD name."
      modelRef: # description="modelRef references a model served by this component. When specified, a headless service is created for endpoint discovery."
        name: string | required=true minLength=1 description="name is the base model identifier (e.g. \"llama-3-70b-instruct-v1\")."
        revision: string | description="revision is the model revision/version."
      multinode: # description="multinode configures multinode components."
        nodeCount: integer | default=2 minimum=2 format=int32 description="nodeCount is the number of nodes to deploy for the multinode component. Total GPUs used is `nodeCount * container GPU request`."
      podTemplate: # description="podTemplate is the pod template used to create the component's pods. The operator injects its defaults (image, command, env, ports, probes, resources, volume mounts) into the container named `\"main\"` inside `podTemplate.spec.containers`, merging user overrides by name. If no container named `\"main\"` is present, the operator auto-generates it with standard defaults. All other containers in `podTemplate.spec.containers` are treated as user-managed sidecars: the operator does not inject defaults into them, so sidecars must specify required fields (e.g. `image`) themselves. The validation webhook rejects pod templates where a non-`\"main\"` container is missing a required field such as `image`."

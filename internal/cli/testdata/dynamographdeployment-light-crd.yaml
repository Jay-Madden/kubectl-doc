apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: dynamographdeployments.nvidia.com
spec:
  group: nvidia.com
  names:
    kind: DynamoGraphDeployment
    plural: dynamographdeployments
    singular: dynamographdeployment
    shortNames:
      - dgd
  scope: Namespaced
  versions:
    - name: v1beta1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          description: DynamoGraphDeployment declares a model serving graph managed by the Dynamo operator.
          required:
            - spec
          properties:
            spec:
              type: object
              description: Spec defines the desired graph topology and pod-level defaults for each component.
              required:
                - components
              properties:
                backendFramework:
                  type: string
                  description: Backend framework used when a component does not override the runtime explicitly.
                  default: sglang
                  enum:
                    - sglang
                    - vllm
                    - trtllm
                annotations:
                  type: object
                  description: Annotations propagated to generated workloads unless a component overrides them.
                  additionalProperties:
                    type: string
                envs:
                  type: array
                  description: Environment variables applied to every component unless a component overrides them.
                  items:
                    type: object
                    required:
                      - name
                    properties:
                      name:
                        type: string
                        description: Name of the environment variable.
                        minLength: 1
                      value:
                        type: string
                        description: Literal value for the environment variable.
                      valueFrom:
                        type: object
                        description: Source for the environment variable value.
                        properties:
                          secretKeyRef:
                            type: object
                            description: Selects a key from a Secret in the same namespace.
                            required:
                              - key
                              - name
                            properties:
                              key:
                                type: string
                                description: Key within the Secret.
                                minLength: 1
                              name:
                                type: string
                                description: Name of the Secret.
                                minLength: 1
                              optional:
                                type: boolean
                                description: Whether the Secret or key may be absent.
                components:
                  type: array
                  description: Components are the named graph nodes reconciled into Kubernetes workloads.
                  x-kubernetes-list-type: map
                  x-kubernetes-list-map-keys:
                    - name
                  items:
                    type: object
                    required:
                      - name
                    properties:
                      name:
                        type: string
                        description: Unique component name used for generated workload and service names.
                        minLength: 1
                        maxLength: 63
                      replicas:
                        type: integer
                        format: int32
                        description: Desired number of pod replicas for the component.
                        default: 1
                        minimum: 0
                      sharedMemorySize:
                        description: Shared memory size mounted into the component pod.
                        anyOf:
                          - type: integer
                          - type: string
                        x-kubernetes-int-or-string: true
                      resources:
                        type: object
                        description: Container resource requests and limits for the component.
                        properties:
                          limits:
                            type: object
                            description: Resource limits keyed by Kubernetes resource name.
                            additionalProperties:
                              type: string
                          requests:
                            type: object
                            description: Resource requests keyed by Kubernetes resource name.
                            additionalProperties:
                              type: string
                      services:
                        type: array
                        description: Service ports exposed by this component.
                        items:
                          type: object
                          required:
                            - name
                            - port
                          properties:
                            name:
                              type: string
                              description: Service port name.
                              minLength: 1
                            port:
                              type: integer
                              format: int32
                              description: Service port number.
                              minimum: 1
                              maximum: 65535
                            protocol:
                              type: string
                              description: Network protocol for the service port.
                              default: TCP
                              enum:
                                - TCP
                                - UDP
                      podTemplate:
                        type: object
                        description: Pod template fragment merged with operator defaults before creating pods.
                        x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              description: Status summarizes the observed deployment state.
              properties:
                conditions:
                  type: array
                  description: Conditions report the latest reconciliation state for the deployment.
                  items:
                    type: object
                    required:
                      - status
                      - type
                    properties:
                      type:
                        type: string
                        description: Condition type.
                      status:
                        type: string
                        description: Condition status.
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                      reason:
                        type: string
                        description: Short machine-readable reason for the condition state.
                      message:
                        type: string
                        description: Human-readable details for the condition state.
                observedGeneration:
                  type: integer
                  format: int64
                  description: Most recent metadata generation observed by the controller.

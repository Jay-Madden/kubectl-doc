apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: dynamographdeployments.nvidia.com
spec:
  group: nvidia.com
  names:
    kind: DynamoGraphDeployment
    plural: dynamographdeployments
    singular: dynamographdeployment
    shortNames:
      - dgd
  scope: Namespaced
  versions:
    - name: v1beta1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - components
              properties:
                backendFramework:
                  type: string
                  enum:
                    - sglang
                    - vllm
                    - trtllm
                components:
                  type: array
                  x-kubernetes-list-type: map
                  x-kubernetes-list-map-keys:
                    - name
                  items:
                    type: object
                    required:
                      - name
                    properties:
                      name:
                        type: string
                        minLength: 1
                        maxLength: 63
                      sharedMemorySize:
                        anyOf:
                          - type: integer
                          - type: string
                        x-kubernetes-int-or-string: true


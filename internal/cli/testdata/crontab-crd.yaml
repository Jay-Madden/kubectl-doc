apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: crontabs.stable.example.com
spec:
  group: stable.example.com
  names:
    kind: CronTab
    plural: crontabs
    singular: crontab
    shortNames:
      - ct
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: false
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - cronSpec
              properties:
                cronSpec:
                  type: string
                  minLength: 1
                image:
                  type: string
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              description: CronTabSpec describes the desired cron job.
              required:
                - cronSpec
                - image
              properties:
                concurrencyPolicy:
                  type: string
                  default: Allow
                  enum:
                    - Allow
                    - Forbid
                    - Replace
                cronSpec:
                  type: string
                  minLength: 1
                image:
                  type: string
                labels:
                  type: object
                  additionalProperties:
                    type: string
                ports:
                  type: array
                  items:
                    type: object
                    required:
                      - name
                      - containerPort
                    properties:
                      containerPort:
                        type: integer
                        format: int32
                      name:
                        type: string
                      protocol:
                        type: string
                        default: TCP
                        enum:
                          - TCP
                          - UDP
                replicas:
                  type: integer
                  format: int32
                  default: 1
                  minimum: 0
            status:
              type: object
              properties:
                lastScheduleTime:
                  type: string
                  format: date-time


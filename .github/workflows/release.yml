name: release

on:
  push:
    tags:
      - "*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check generated docs are current
        run: make check-generated

      - name: Run tests
        run: make test

      - name: Run golangci-lint
        run: make lint

  build:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip
          - goos: windows
            goarch: arm64
            archive: zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOARCH: ${{ matrix.goarch }}
          GOOS: ${{ matrix.goos }}
        run: |
          set -euo pipefail

          safe_version="${GITHUB_REF_NAME//\//-}"
          target="kubectl-doc-${safe_version}-${GOOS}-${GOARCH}"
          binary="kubectl-doc"
          if [ "$GOOS" = "windows" ]; then
            binary="kubectl-doc.exe"
          fi

          mkdir -p "dist/${target}"
          go build -trimpath -ldflags="-s -w" -o "dist/${target}/${binary}" ./cmd/kubectl-doc
          cp LICENSE "dist/${target}/LICENSE"

      - name: Package binary
        env:
          GOARCH: ${{ matrix.goarch }}
          GOOS: ${{ matrix.goos }}
        run: |
          set -euo pipefail

          safe_version="${GITHUB_REF_NAME//\//-}"
          target="kubectl-doc-${safe_version}-${GOOS}-${GOARCH}"
          archive="${target}.${{ matrix.archive }}"

          if [ "${{ matrix.archive }}" = "zip" ]; then
            (cd dist && zip -qr "$archive" "$target")
          else
            tar -C dist -czf "dist/$archive" "$target"
          fi

          (cd dist && sha256sum "$archive" > "$archive.sha256")

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: kubectl-doc-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.${{ matrix.archive }}
            dist/*.${{ matrix.archive }}.sha256
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: kubectl-doc-*
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG" dist/* --repo "$GITHUB_REPOSITORY" --verify-tag --title "$TAG" --generate-notes
          fi

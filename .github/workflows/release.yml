name: release

on:
  push:
    tags:
      - "*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check generated docs are current
        run: make check-generated

      - name: Run tests
        run: make test

      - name: Run golangci-lint
        run: make lint

  build:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip
          - goos: windows
            goarch: arm64
            archive: zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOARCH: ${{ matrix.goarch }}
          GOOS: ${{ matrix.goos }}
        run: |
          set -euo pipefail

          safe_version="${GITHUB_REF_NAME//\//-}"
          target="kubectl-doc-${safe_version}-${GOOS}-${GOARCH}"
          binary="kubectl-doc"
          if [ "$GOOS" = "windows" ]; then
            binary="kubectl-doc.exe"
          fi

          mkdir -p "dist/${target}"
          go build -trimpath -ldflags="-s -w" -o "dist/${target}/${binary}" ./cmd/kubectl-doc
          cp LICENSE "dist/${target}/LICENSE"

      - name: Package binary
        env:
          GOARCH: ${{ matrix.goarch }}
          GOOS: ${{ matrix.goos }}
        run: |
          set -euo pipefail

          safe_version="${GITHUB_REF_NAME//\//-}"
          target="kubectl-doc-${safe_version}-${GOOS}-${GOARCH}"
          archive="${target}.${{ matrix.archive }}"

          if [ "${{ matrix.archive }}" = "zip" ]; then
            (cd dist && zip -qr "$archive" "$target")
          else
            tar -C dist -czf "dist/$archive" "$target"
          fi

          (cd dist && sha256sum "$archive" > "$archive.sha256")

      - name: Upload binary artifact
        uses: actions/upload-artifact@v6
        with:
          name: kubectl-doc-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.${{ matrix.archive }}
            dist/*.${{ matrix.archive }}.sha256
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          pattern: kubectl-doc-*
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG" dist/* --repo "$GITHUB_REPOSITORY" --verify-tag --title "$TAG" --generate-notes
          fi

  update-krew-index:
    needs: publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref_name, 'v')

    env:
      GH_TOKEN: ${{ secrets.KREW_INDEX_TOKEN }}
      KREW_INDEX_FORK: sttts/krew-index
      TAG: ${{ github.ref_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download release artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          pattern: kubectl-doc-*
          merge-multiple: true

      - name: Render doc Krew manifest
        run: |
          set -euo pipefail

          mkdir -p rendered
          manifest="rendered/doc.yaml"
          cp doc.yaml "$manifest"

          linux_amd64="$(cut -d ' ' -f1 "dist/kubectl-doc-${TAG}-linux-amd64.tar.gz.sha256")"
          linux_arm64="$(cut -d ' ' -f1 "dist/kubectl-doc-${TAG}-linux-arm64.tar.gz.sha256")"
          darwin_amd64="$(cut -d ' ' -f1 "dist/kubectl-doc-${TAG}-darwin-amd64.tar.gz.sha256")"
          darwin_arm64="$(cut -d ' ' -f1 "dist/kubectl-doc-${TAG}-darwin-arm64.tar.gz.sha256")"
          windows_amd64="$(cut -d ' ' -f1 "dist/kubectl-doc-${TAG}-windows-amd64.zip.sha256")"
          windows_arm64="$(cut -d ' ' -f1 "dist/kubectl-doc-${TAG}-windows-arm64.zip.sha256")"

          sed -i \
            -e "s/v0.0.0/${TAG}/g" \
            -e "s/TODO_LINUX_AMD64_SHA256/${linux_amd64}/g" \
            -e "s/TODO_LINUX_ARM64_SHA256/${linux_arm64}/g" \
            -e "s/TODO_DARWIN_AMD64_SHA256/${darwin_amd64}/g" \
            -e "s/TODO_DARWIN_ARM64_SHA256/${darwin_arm64}/g" \
            -e "s/TODO_WINDOWS_AMD64_SHA256/${windows_amd64}/g" \
            -e "s/TODO_WINDOWS_ARM64_SHA256/${windows_arm64}/g" \
            "$manifest"
          sed -i '/^#/d' "$manifest"

      - name: Push Krew manifest branch
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN}" ]; then
            echo "KREW_INDEX_TOKEN secret is not set."
            exit 1
          fi
          git_auth_header="$(printf 'x-access-token:%s' "${GH_TOKEN}" | base64 | tr -d '\n')"
          git_auth=(
            -c credential.helper=
            -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${git_auth_header}"
          )
          git "${git_auth[@]}" clone --depth 1 "https://github.com/${KREW_INDEX_FORK}.git" krew-index

          branch="update-doc-${TAG}"
          cd krew-index
          if git "${git_auth[@]}" ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
            git "${git_auth[@]}" fetch origin "$branch"
            git checkout -B "$branch" "origin/$branch"
          else
            git checkout -B "$branch"
          fi

          mkdir -p plugins
          cp ../rendered/doc.yaml plugins/doc.yaml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins/doc.yaml
          if git diff --cached --quiet; then
            echo "Krew manifest for ${TAG} is already current."
            exit 0
          fi
          git commit -m "plugins/doc: update to ${TAG}"
          git "${git_auth[@]}" push -u origin "$branch"

      # Manual PR step after the branch is pushed:
      #
      # fork_owner="${KREW_INDEX_FORK%%/*}"
      # gh pr create \
      #   --repo kubernetes-sigs/krew-index \
      #   --base master \
      #   --head "${fork_owner}:update-doc-${TAG}" \
      #   --title "plugins/doc: update to ${TAG}" \
      #   --body "Update kubectl-doc Krew manifest for ${TAG}."

name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: fern/dev/package-lock.json

      - name: Check generated docs are current
        run: make check-generated

      - name: Run tests
        run: make test

      - name: Run web embedding parity tests
        run: make check-fern-dev PLAYWRIGHT_INSTALL_FLAGS="--with-deps chromium"

      - name: Run golangci-lint
        run: make lint

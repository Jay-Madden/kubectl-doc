# Draft manifest for kubernetes-sigs/krew-index/plugins/doc.yaml.
# Replace v0.0.0 and the sha256 placeholders with a real release before
# submitting to krew-index.
apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: doc
spec:
  version: v0.0.0
  homepage: https://github.com/sttts/kubectl-doc
  shortDescription: Render Kubernetes API documentation
  description: |
    Render Kubernetes OpenAPI v3 schemas as YAML-shaped documentation for
    terminal, Markdown, HTML, and interactive documentation surfaces.

    kubectl doc can read schemas from a live cluster or from local CRD
    manifests. It supports YAML, Markdown, Kro SimpleSchema, HTML, browser,
    and terminal UI output formats.
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/sttts/kubectl-doc/releases/download/v0.0.0/kubectl-doc-v0.0.0-linux-amd64.tar.gz
      sha256: TODO_LINUX_AMD64_SHA256
      files:
        - from: kubectl-doc-v0.0.0-linux-amd64/kubectl-doc
          to: .
        - from: kubectl-doc-v0.0.0-linux-amd64/LICENSE
          to: .
      bin: kubectl-doc

    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/sttts/kubectl-doc/releases/download/v0.0.0/kubectl-doc-v0.0.0-linux-arm64.tar.gz
      sha256: TODO_LINUX_ARM64_SHA256
      files:
        - from: kubectl-doc-v0.0.0-linux-arm64/kubectl-doc
          to: .
        - from: kubectl-doc-v0.0.0-linux-arm64/LICENSE
          to: .
      bin: kubectl-doc

    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/sttts/kubectl-doc/releases/download/v0.0.0/kubectl-doc-v0.0.0-darwin-amd64.tar.gz
      sha256: TODO_DARWIN_AMD64_SHA256
      files:
        - from: kubectl-doc-v0.0.0-darwin-amd64/kubectl-doc
          to: .
        - from: kubectl-doc-v0.0.0-darwin-amd64/LICENSE
          to: .
      bin: kubectl-doc

    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/sttts/kubectl-doc/releases/download/v0.0.0/kubectl-doc-v0.0.0-darwin-arm64.tar.gz
      sha256: TODO_DARWIN_ARM64_SHA256
      files:
        - from: kubectl-doc-v0.0.0-darwin-arm64/kubectl-doc
          to: .
        - from: kubectl-doc-v0.0.0-darwin-arm64/LICENSE
          to: .
      bin: kubectl-doc

    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/sttts/kubectl-doc/releases/download/v0.0.0/kubectl-doc-v0.0.0-windows-amd64.zip
      sha256: TODO_WINDOWS_AMD64_SHA256
      files:
        - from: kubectl-doc-v0.0.0-windows-amd64/kubectl-doc.exe
          to: .
        - from: kubectl-doc-v0.0.0-windows-amd64/LICENSE
          to: .
      bin: kubectl-doc.exe

    - selector:
        matchLabels:
          os: windows
          arch: arm64
      uri: https://github.com/sttts/kubectl-doc/releases/download/v0.0.0/kubectl-doc-v0.0.0-windows-arm64.zip
      sha256: TODO_WINDOWS_ARM64_SHA256
      files:
        - from: kubectl-doc-v0.0.0-windows-arm64/kubectl-doc.exe
          to: .
        - from: kubectl-doc-v0.0.0-windows-arm64/LICENSE
          to: .
      bin: kubectl-doc.exe
